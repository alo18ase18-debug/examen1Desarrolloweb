<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Nuevo Aeropuerto</title>
</head>
<body>
    <h1>Agregar Aeropuerto</h1>

    <form th:action="@{/aeropuertos/guardar}" action="/aeropuertos/guardar"
          method="post" th:object="${aeropuerto}">

        <label>ID:</label><br>
        <input type="number" name="id" th:field="*{id}" required><br><br>

        <label>Nombre:</label><br>
        <input type="text" name="nombre" th:field="*{nombre}" size="50" required><br><br>

        <label>Ciudad:</label><br>
        <input type="text" name="ciudad" th:field="*{ciudad}" required><br><br>

        <label>País:</label><br>
        <input type="text" name="pais" th:field="*{pais}" required><br><br>

        <label>Código:</label><br>
        <input type="text" name="codigo" th:field="*{codigo}" maxlength="10" required><br><br>

        <input type="submit" value="Guardar">
        &nbsp;
        <a th:href="@{/aeropuertos}" href="/aeropuertos">Cancelar</a>
    </form>
</body>
</html>
